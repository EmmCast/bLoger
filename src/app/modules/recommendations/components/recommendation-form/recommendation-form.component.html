<section class="form-page">

  <h1>Agregar {{ type }}</h1>

  <form>

    <div class="form-group">
      <label>Título</label>
      <input type="text" [(ngModel)]="title" name="title">
    </div>

    <div class="form-group">
      <label>Género</label>
      <select [(ngModel)]="genre" name="genre">
        <option value="">Selecciona un género</option>
        <option value="Acción">Acción</option>
        <option value="Aventura">Aventura</option>
        <option value="Comedia">Comedia</option>
        <option value="Drama">Drama</option>
        <option value="Fantasía">Fantasía</option>
        <option value="Ciencia ficción">Ciencia ficción</option>
        <option value="Romance">Romance</option>
        <option value="Suspenso">Suspenso</option>
        <option value="Distopía">Distopía</option>
        <option value="Sandbox">Sandbox</option>
      </select>
    </div>

    <div class="form-group">
      <label>Año</label>
      <input type="number" [(ngModel)]="year" name="year">
    </div>

    <div class="form-group">
      <label>Descripción</label>
      <textarea rows="5" [(ngModel)]="description" name="description"></textarea>
    </div>

    <div class="form-group">
      <label>Imagen</label>
      <input type="file" accept="image/*" (change)="onImageSelected($event)">
    </div>

    <div class="preview" *ngIf="image">
      <img [src]="image" alt="Vista previa">
    </div>

    <div class="form-group" *ngIf="type !== 'libro'">
      <label>Trailer URL</label>
      <input
        type="text"
        [(ngModel)]="trailerUrl"
        name="trailerUrl">
    </div>

    <button type="button" (click)="save()">
      Guardar
    </button>

    <button type="button" class="secondary" (click)="goBack()">
      Regresar
    </button>

  </form>

</section>
