<section class="detail-page" *ngIf="recommendation">

  <button class="logout-button" (click)="logout()">
    Cerrar sesión
  </button>

  <div class="detail-container">

    <div class="image-box">
      <img [src]="recommendation.image" [alt]="recommendation.title">
    </div>

    <div class="info-box">
      <h1>{{ recommendation.title }}</h1>

      <p><strong>Género:</strong> {{ recommendation.genre }}</p>
      <p><strong>Año:</strong> {{ recommendation.year }}</p>
      <p><strong>Agregado por:</strong> {{ recommendation.user }}</p>

      <p class="description">
        {{ recommendation.description }}
      </p>

      <button class="back-button" (click)="goBack()">
        Regresar
      </button>
    </div>

  </div>

</section>
